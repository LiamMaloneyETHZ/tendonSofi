<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IMU Visualization with Complementary and Kalman</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: row;
      height: 100vh;
    }
    #left {
      flex: 0 0 40%;
      position: relative;
      background-color: black;
    }
    #right {
      flex: 0 0 60%;
      background: black;
      display: flex;
      flex-direction: column;
    }
    #rpy, #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: none;
      padding: 5px;
      font-size: 18px;
      z-index: 10;
    }
    #controls {
      top: 70px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      background-color: #1a1a1a;
      color: white;
      border: 2px solid #444;
      border-radius: 5px;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #333;
    }
    #rpyChart, #kalmanChart {
      width: 100%;
      height: 50%;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="left">
    <div id="rpy">Roll: 0 | Pitch: 0 | Yaw: 0</div>
    <div id="controls">
      <button onclick="startRecording()">Start Recording</button>
      <button onclick="stopRecording()">Stop Recording</button>
      <button onclick="downloadCSV()">Download CSV</button>
    </div>
  </div>
  <div id="right">
    <canvas id="rpyChart"></canvas>
    <canvas id="kalmanChart"></canvas>
  </div>

  <script>
    // === Three.js IMU Box ===
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    document.getElementById("left").appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 5, 5);
    scene.add(ambientLight, dirLight);

    const imuGroup = new THREE.Group();
    scene.add(imuGroup);

    const geometry = new THREE.BoxGeometry(0.6, 0.1, 0.4);
    geometry.rotateX(-Math.PI / 2);

    const material = new THREE.MeshPhongMaterial({ color: 0x88aaff, shininess: 30 });
    const imuBox = new THREE.Mesh(geometry, material);

    const wireframe = new THREE.EdgesGeometry(geometry);
    const edges = new THREE.LineSegments(wireframe, new THREE.LineBasicMaterial({ color: 0xffffff }));
    imuBox.add(edges);

    const axesHelper = new THREE.AxesHelper(0.8);
    imuBox.add(axesHelper);

    imuGroup.add(imuBox);

    const gridHelper = new THREE.GridHelper(5, 10);
    scene.add(gridHelper);

    camera.position.set(2, 2, 2);
    camera.lookAt(0, 0, 0);

    function animate() {
      requestAnimationFrame(animate);
      const leftDiv = document.getElementById("left");
      renderer.setSize(leftDiv.clientWidth, leftDiv.clientHeight);
      camera.aspect = leftDiv.clientWidth / leftDiv.clientHeight;
      camera.updateProjectionMatrix();
      renderer.render(scene, camera);
    }
    animate();

    // === Chart.js Setup ===
    const ctx1 = document.getElementById("rpyChart").getContext("2d");
    const ctx2 = document.getElementById("kalmanChart").getContext("2d");

    const rpyChart = new Chart(ctx1, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          { label: "Roll (CF)", data: [], borderColor: "red", backgroundColor: "red", fill: false, pointRadius: 3, pointStyle: "circle" },
          { label: "Pitch (CF)", data: [], borderColor: "green", backgroundColor: "green", fill: false, pointRadius: 3, pointStyle: "circle" },
          { label: "Yaw (CF)", data: [], borderColor: "blue", backgroundColor: "blue", fill: false, pointRadius: 3, pointStyle: "circle" }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {   // 🔥 Added this to disable bounce animation
          duration: 0
        },
        plugins: {
          legend: { labels: { color: "white" } },
          tooltip: { backgroundColor: "rgba(0,0,0,0.8)" }
        },
        scales: {
          x: { ticks: { color: "white" }, grid: { color: "#444" }},
          y: { ticks: { color: "white" }, grid: { color: "#444" }}
        }
      }
    });

    const kalmanChart = new Chart(ctx2, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          { label: "Roll (Kalman)", data: [], borderColor: "cyan", backgroundColor: "cyan", fill: false, pointRadius: 3, pointStyle: "circle" },
          { label: "Pitch (Kalman)", data: [], borderColor: "magenta", backgroundColor: "magenta", fill: false, pointRadius: 3, pointStyle: "circle" }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {   // 🔥 Added this to disable bounce animation
          duration: 0
        },
        plugins: {
          legend: { labels: { color: "white" } },
          tooltip: { backgroundColor: "rgba(0,0,0,0.8)" }
        },
        scales: {
          x: { ticks: { color: "white" }, grid: { color: "#444" }},
          y: { ticks: { color: "white" }, grid: { color: "#444" }}
        }
      }
    });

    let recordedData = [];
    let recording = false;
    let startTime = 0;

    async function fetchRPY() {
      const res = await fetch("/rpy");
      const data = await res.json();

      document.getElementById("rpy").innerText =
        `Roll: ${data.roll.toFixed(1)}° | Pitch: ${data.pitch.toFixed(1)}° | Yaw: ${data.yaw.toFixed(1)}°`;

      imuGroup.rotation.order = "ZYX";
      imuGroup.rotation.x = THREE.MathUtils.degToRad(data.roll);
      imuGroup.rotation.y = THREE.MathUtils.degToRad(data.pitch);
      imuGroup.rotation.z = THREE.MathUtils.degToRad(data.yaw);

      if (recording) {
        const now = (Date.now() / 1000) - startTime;
        rpyChart.data.labels.push(now.toFixed(2));
        rpyChart.data.datasets[0].data.push(data.roll);
        rpyChart.data.datasets[1].data.push(data.pitch);
        rpyChart.data.datasets[2].data.push(data.yaw);

        kalmanChart.data.labels.push(now.toFixed(2));
        kalmanChart.data.datasets[0].data.push(data.kalman_roll);
        kalmanChart.data.datasets[1].data.push(data.kalman_pitch);

        rpyChart.update();
        kalmanChart.update();

        recordedData.push({ time: now, ...data });
      }
    }

    async function startRecording() {
      await fetch("/start_recording", { method: "POST" });
      recordedData = [];
      startTime = Date.now() / 1000;
      rpyChart.data.labels = [];
      rpyChart.data.datasets.forEach(ds => ds.data = []);
      kalmanChart.data.labels = [];
      kalmanChart.data.datasets.forEach(ds => ds.data = []);
      recording = true;
    }

    async function stopRecording() {
      await fetch("/stop_recording", { method: "POST" });
      recording = false;
    }

    function downloadCSV() {
      if (recordedData.length === 0) {
        alert("No data recorded yet!");
        return;
      }
      let keys = Object.keys(recordedData[0]);
      let csv = keys.join(",") + "\n";
      recordedData.forEach(d => {
        csv += keys.map(k => d[k]).join(",") + "\n";
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "imu_recording.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    setInterval(fetchRPY, 50);
  </script>
</body>
</html>
